<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripture Sequence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lora:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #060a18;
    --bg-mid: #0c1230;
    --gold: #ffd060;
    --gold-light: #ffe090;
    --gold-dark: #c89020;
    --tile-border: #7090d0;
    --tile-front: #f8f4e8;
    --correct: #5ccc5c;
    --wrong: #f05050;
    --text: #ffffff;
    --text-dim: #b0c0e0;
    --player-active: #ffd060;
    --player-inactive: #4a5a80;
    --bg-glow: rgba(30, 50, 100, 0.4);
    --bg-warm: rgba(100, 60, 20, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    height: 100vh; width: 100vw;
    overflow: hidden;
    display: flex; flex-direction: column;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, var(--bg-glow), transparent),
      radial-gradient(ellipse 60% 50% at 20% 80%, var(--bg-warm), transparent),
      radial-gradient(ellipse 60% 50% at 80% 80%, var(--bg-warm), transparent);
    pointer-events: none; z-index: 0;
  }

  /* ====== FULLSCREEN BUTTON ====== */
  .fullscreen-btn {
    position: fixed; top: 10px; right: 10px; z-index: 200;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-dim); font-size: 18px; width: 36px; height: 36px;
    border-radius: 8px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; opacity: 0.4; transition: opacity 0.3s;
  }
  .fullscreen-btn:hover { opacity: 1; background: rgba(255,255,255,0.15); }
  body:fullscreen .fullscreen-btn { opacity: 0.15; }
  body:fullscreen .fullscreen-btn:hover { opacity: 0.8; }

  /* ====== WAITING SCREEN ====== */
  .waiting-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; z-index: 1;
    overflow: hidden;
  }

  /* ---- Animated Background Layers ---- */
  .waiting-bg {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }

  /* Slow-moving light rays from center */
  .waiting-bg .ray {
    position: absolute; top: 50%; left: 50%;
    width: 3px; height: 140%; transform-origin: 0 0;
    background: linear-gradient(to top, transparent 0%, var(--gold) 40%, transparent 100%);
    opacity: 0;
    animation: rayRotate var(--dur) linear infinite, rayFade var(--fade) ease-in-out infinite;
  }
  @keyframes rayRotate {
    from { transform: rotate(var(--start)); }
    to   { transform: rotate(calc(var(--start) + 360deg)); }
  }
  @keyframes rayFade {
    0%, 100% { opacity: 0; }
    30%, 70% { opacity: var(--peak); }
  }

  /* Floating particles (crosses & sparkles) */
  .waiting-bg .particle {
    position: absolute; font-size: var(--size);
    color: var(--gold); opacity: 0;
    animation: particleFloat var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    text-shadow: 0 0 10px currentColor;
  }
  @keyframes particleFloat {
    0%   { transform: translateY(110vh) scale(0.3); opacity: 0; }
    10%  { opacity: var(--peak); }
    90%  { opacity: var(--peak); }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* Pulsing glow ring behind title */
  .waiting-glow {
    position: absolute; width: 500px; height: 500px;
    border-radius: 50%; pointer-events: none;
    background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
    opacity: 0.06;
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { transform: scale(0.8); opacity: 0.04; }
    50%      { transform: scale(1.2); opacity: 0.1; }
  }

  /* Title styling */
  .waiting-screen h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 8vw, 96px); font-weight: 900;
    color: var(--gold);
    text-shadow:
      0 0 60px color-mix(in srgb, var(--gold) 50%, transparent),
      0 0 120px color-mix(in srgb, var(--gold) 20%, transparent),
      0 4px 12px rgba(0,0,0,0.5);
    letter-spacing: 2px; text-align: center;
    position: relative; z-index: 2;
    animation: titleShimmer 4s ease-in-out infinite;
  }
  @keyframes titleShimmer {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.2); }
  }

  .waiting-screen p {
    font-family: 'Lora', serif;
    font-size: clamp(16px, 2.5vw, 28px);
    color: var(--text-dim); margin-top: 16px; font-style: italic;
    position: relative; z-index: 2;
  }
  .fullscreen-hint {
    font-size: clamp(12px, 1.5vw, 18px); color: var(--text-dim);
    margin-top: 40px; opacity: 0.5;
    animation: hintPulse 3s ease infinite;
    position: relative; z-index: 2;
  }
  @keyframes hintPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }
  body:fullscreen .fullscreen-hint { display: none; }
  .cross-watermark {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 300px; opacity: 0.05;
    color: var(--gold); pointer-events: none; z-index: 1;
    animation: crossPulse 6s ease-in-out infinite;
  }
  @keyframes crossPulse {
    0%, 100% { opacity: 0.03; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 0.07; transform: translate(-50%, -50%) scale(1.05); }
  }

  /* ====== GAME SCREEN ====== */
  .game-screen {
    flex: 1; display: none; flex-direction: column;
    position: relative; z-index: 1;
    padding: 16px 30px;
  }
  .game-screen.active { display: flex; }

  /* ====== HEADER ====== */
  .game-header {
    text-align: center; margin-bottom: 4px; flex-shrink: 0;
  }
  .game-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 3vw, 40px); font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 40px color-mix(in srgb, var(--gold) 40%, transparent), 0 2px 8px rgba(0,0,0,0.5);
  }
  .verse-reference {
    font-family: 'Lora', serif;
    font-size: clamp(14px, 1.8vw, 24px);
    color: var(--text); font-style: italic;
  }

  /* ====== TIMER BAR ====== */
  .timer-bar-container {
    width: 100%; height: 6px; background: rgba(255,255,255,0.05);
    border-radius: 3px; margin-top: 6px; overflow: hidden;
    opacity: 0; transition: opacity 0.3s;
  }
  .timer-bar-container.active { opacity: 1; }
  .timer-bar {
    height: 100%; border-radius: 3px;
    background: var(--gold);
    transition: width 1s linear, background-color 0.5s;
    width: 100%;
  }
  .timer-bar.warning { background: var(--wrong); }

  /* ====== STOPWATCH ====== */
  .stopwatch-container {
    text-align: center; margin-top: 6px;
    opacity: 0; transition: opacity 0.3s;
    height: 0; overflow: hidden;
  }
  .stopwatch-container.active { opacity: 1; height: auto; }
  .stopwatch-time {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 52px);
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 20px color-mix(in srgb, var(--gold) 30%, transparent);
    letter-spacing: 3px;
  }

  /* ====== TILE GRID ====== */
  .tile-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 8px 0; min-height: 0;
  }
  .tile-grid {
    display: grid; gap: clamp(8px, 1.5vw, 16px);
    justify-content: center; perspective: 1200px;
  }

  /* ====== TILES ====== */
  .tile { position: relative; border-radius: 12px; cursor: default; }
  .tile-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .tile.flipped .tile-inner { transform: rotateY(180deg); }

  .tile-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; flex-direction: column;
  }

  .tile-back {
    background: linear-gradient(145deg, color-mix(in srgb, var(--tile-border) 40%, var(--bg-deep)), var(--bg-deep));
    border: 4px solid var(--tile-border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,255,255,0.04);
    overflow: hidden;
  }
  .tile-back::before {
    content: ''; position: absolute; inset: 6px;
    border: 2px solid color-mix(in srgb, var(--gold) 60%, transparent);
    border-radius: 8px;
  }
  .tile-back::after {
    content: '\2720';
    font-size: clamp(28px, 4vw, 56px);
    color: color-mix(in srgb, var(--gold) 50%, transparent);
  }
  .tile-number {
    position: absolute; top: 8px; left: 10px;
    font-size: clamp(18px, 2.5vw, 32px);
    color: var(--gold-light);
    font-weight: 900;
    font-family: 'Inter', sans-serif;
    text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 0 20px color-mix(in srgb, var(--gold) 40%, transparent);
  }

  .tile-front {
    background: linear-gradient(145deg, var(--tile-front), color-mix(in srgb, var(--tile-front) 85%, #aaa));
    border: 2px solid var(--gold-dark);
    transform: rotateY(180deg);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 8px;
  }
  .tile-word {
    font-family: 'Lora', serif;
    font-size: clamp(16px, 2.5vw, 36px); font-weight: 700;
    color: #2a1f0a; text-align: center; word-break: break-word; line-height: 1.2;
  }

  /* Tile States */
  .tile.found .tile-front {
    border-color: var(--correct);
    box-shadow: 0 0 20px color-mix(in srgb, var(--correct) 40%, transparent),
                0 0 40px color-mix(in srgb, var(--correct) 15%, transparent);
  }
  .tile.found .tile-word { color: #1a5a2a; }

  .tile.wrong .tile-front {
    border-color: var(--wrong);
    box-shadow: 0 0 20px color-mix(in srgb, var(--wrong) 50%, transparent),
                0 0 40px color-mix(in srgb, var(--wrong) 20%, transparent);
    animation: wrongShake 0.5s ease;
  }
  .tile.wrong .tile-word { color: #8b1a1a; }

  .tile.flip-back .tile-inner {
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .tile.correct-pulse { animation: correctPulse 0.6s ease; }
  .tile.correct-glow .tile-front {
    animation: correctGlowBurst 0.8s ease;
  }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    25% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  @keyframes correctGlowBurst {
    0% { box-shadow: 0 0 20px color-mix(in srgb, var(--correct) 40%, transparent); }
    30% { box-shadow: 0 0 40px color-mix(in srgb, var(--correct) 80%, transparent), 0 0 80px color-mix(in srgb, var(--correct) 30%, transparent); }
    100% { box-shadow: 0 0 20px color-mix(in srgb, var(--correct) 40%, transparent); }
  }
  @keyframes wrongShake {
    0%, 100% { transform: translateX(0) rotateY(180deg); }
    15% { transform: translateX(-8px) rotateY(180deg); }
    30% { transform: translateX(8px) rotateY(180deg); }
    45% { transform: translateX(-6px) rotateY(180deg); }
    60% { transform: translateX(6px) rotateY(180deg); }
    75% { transform: translateX(-3px) rotateY(180deg); }
  }

  .tile.empty-slot { visibility: hidden; }

  /* ====== FOUND WORDS ====== */
  .found-section { flex-shrink: 0; text-align: center; padding: 8px 20px; }
  .found-words-display {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 6px; min-height: 40px; align-items: center;
  }
  .fw-word {
    font-family: 'Lora', serif;
    font-size: clamp(14px, 1.8vw, 24px); font-weight: 700;
    padding: 3px 10px; border-radius: 8px; transition: all 0.4s ease;
  }
  .fw-word.found {
    background: color-mix(in srgb, var(--correct) 20%, transparent);
    color: color-mix(in srgb, var(--correct) 100%, #8f8);
    border: 1px solid color-mix(in srgb, var(--correct) 30%, transparent);
    animation: wordAppear 0.4s ease;
  }
  .fw-word.blank {
    background: rgba(30, 58, 95, 0.5);
    color: var(--text-dim);
    border: 1px solid rgba(80, 120, 180, 0.4);
    min-width: 45px;
  }
  .fw-word.blank::after { content: '\00B7\00B7\00B7\00B7'; }
  @keyframes wordAppear {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ====== PLAYER BAR ====== */
  .player-bar {
    flex-shrink: 0; display: flex; justify-content: center;
    gap: clamp(20px, 5vw, 80px); padding: 10px 20px;
  }
  .player-panel {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 20px; border-radius: 12px;
    border: 3px solid var(--player-inactive);
    background: rgba(15, 25, 50, 0.7);
    transition: all 0.4s ease; min-width: 180px;
  }
  .player-panel.active {
    border-color: var(--player-active);
    background: color-mix(in srgb, var(--player-active) 15%, transparent);
    box-shadow: 0 0 30px color-mix(in srgb, var(--player-active) 30%, transparent);
  }
  .player-indicator {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--player-inactive); transition: all 0.4s ease;
  }
  .player-panel.active .player-indicator {
    background: var(--gold);
    box-shadow: 0 0 10px color-mix(in srgb, var(--gold) 60%, transparent);
    animation: indicatorPulse 1.5s ease infinite;
  }
  @keyframes indicatorPulse {
    0%, 100% { box-shadow: 0 0 10px color-mix(in srgb, var(--gold) 60%, transparent); }
    50% { box-shadow: 0 0 20px color-mix(in srgb, var(--gold) 90%, transparent); }
  }
  .player-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(14px, 1.8vw, 22px); font-weight: 700; color: var(--text);
  }
  .player-panel.active .player-name { color: var(--gold-light); }
  .player-score {
    font-size: clamp(24px, 3vw, 44px); font-weight: 900;
    color: var(--text-dim); margin-left: auto;
    font-family: 'Playfair Display', serif;
  }
  .player-panel.active .player-score { color: var(--gold); }

  /* ====== CELEBRATION ====== */
  .celebration-overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    z-index: 100; background: rgba(7, 11, 26, 0.85);
    animation: fadeIn 0.4s ease;
  }
  .celebration-overlay.active { display: flex; }
  .celebration-content { text-align: center; animation: celebrationZoom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .celebration-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 80px); font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 40px color-mix(in srgb, var(--gold) 50%, transparent), 0 4px 12px rgba(0,0,0,0.5);
  }
  .celebration-content p {
    font-family: 'Lora', serif;
    font-size: clamp(18px, 3vw, 36px); color: var(--text); margin-top: 10px;
  }
  .celebration-verse {
    font-family: 'Lora', serif;
    font-size: clamp(14px, 2vw, 22px);
    color: var(--gold-light); margin-top: 20px;
    max-width: 700px; line-height: 1.6; font-style: italic; opacity: 0.9;
  }
  @keyframes celebrationZoom { 0% { transform: scale(0.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

  /* ====== CONFETTI ====== */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden; }
  .confetti-piece {
    position: absolute; width: 10px; height: 20px; top: -20px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ====== TURN TRANSITION ====== */
  .turn-flash {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    z-index: 50; background: rgba(7, 11, 26, 0.7);
    animation: fadeIn 0.2s ease;
  }
  .turn-flash.active { display: flex; }
  .turn-flash h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 60px); color: var(--gold);
    text-shadow: 0 0 30px color-mix(in srgb, var(--gold) 40%, transparent);
    animation: celebrationZoom 0.4s ease;
  }

  /* ====== WRONG FLASH ====== */
  .wrong-flash {
    position: fixed; inset: 0; pointer-events: none; z-index: 45;
    background: color-mix(in srgb, var(--wrong) 15%, transparent);
    animation: wrongFlashAnim 0.4s ease forwards;
  }
  @keyframes wrongFlashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>

<button class="fullscreen-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">&#x26F6;</button>

<!-- WAITING SCREEN -->
<div class="waiting-screen" id="waitingScreen">
  <!-- Animated background -->
  <div class="waiting-bg">
    <!-- Light rays -->
    <div class="ray" style="--start:0deg;--dur:45s;--fade:7s;--peak:0.07"></div>
    <div class="ray" style="--start:60deg;--dur:50s;--fade:9s;--peak:0.05"></div>
    <div class="ray" style="--start:120deg;--dur:40s;--fade:6s;--peak:0.06"></div>
    <div class="ray" style="--start:180deg;--dur:55s;--fade:8s;--peak:0.08"></div>
    <div class="ray" style="--start:240deg;--dur:42s;--fade:7s;--peak:0.05"></div>
    <div class="ray" style="--start:300deg;--dur:48s;--fade:10s;--peak:0.06"></div>
    <!-- Floating particles -->
    <div class="particle" style="left:8%;--size:24px;--dur:14s;--delay:0s;--peak:0.25">&#10016;</div>
    <div class="particle" style="left:20%;--size:16px;--dur:18s;--delay:2s;--peak:0.2">&#10022;</div>
    <div class="particle" style="left:35%;--size:20px;--dur:16s;--delay:5s;--peak:0.15">&#10016;</div>
    <div class="particle" style="left:50%;--size:14px;--dur:20s;--delay:1s;--peak:0.2">&#10022;</div>
    <div class="particle" style="left:65%;--size:22px;--dur:15s;--delay:7s;--peak:0.18">&#10016;</div>
    <div class="particle" style="left:78%;--size:18px;--dur:17s;--delay:3s;--peak:0.22">&#10022;</div>
    <div class="particle" style="left:90%;--size:16px;--dur:19s;--delay:9s;--peak:0.15">&#10016;</div>
    <div class="particle" style="left:14%;--size:12px;--dur:22s;--delay:4s;--peak:0.18">&#10022;</div>
    <div class="particle" style="left:42%;--size:26px;--dur:13s;--delay:6s;--peak:0.12">&#10016;</div>
    <div class="particle" style="left:72%;--size:14px;--dur:21s;--delay:8s;--peak:0.2">&#10022;</div>
  </div>
  <!-- Glow ring behind title -->
  <div class="waiting-glow"></div>
  <div class="cross-watermark">&cross;</div>
  <h1>Scripture Sequence</h1>
  <p>Waiting for the game to begin...</p>
  <p class="fullscreen-hint" id="fullscreenHint">Press F for fullscreen</p>
</div>

<!-- GAME SCREEN -->
<div class="game-screen" id="gameScreen">
  <div class="game-header">
    <div class="game-title">Scripture Sequence</div>
    <div class="verse-reference" id="verseRef"></div>
    <div class="timer-bar-container" id="timerBarContainer">
      <div class="timer-bar" id="timerBar"></div>
    </div>
    <div class="stopwatch-container" id="stopwatchContainer">
      <span class="stopwatch-time" id="stopwatchTime">0:00.0</span>
    </div>
  </div>

  <div class="tile-area">
    <div class="tile-grid" id="tileGrid"></div>
  </div>

  <div class="found-section">
    <div class="found-words-display" id="foundWords"></div>
  </div>

  <div class="player-bar" id="playerBar"></div>
</div>

<!-- Turn Transition -->
<div class="turn-flash" id="turnFlash"><h2 id="turnFlashText"></h2></div>

<!-- Celebration Overlay -->
<div class="celebration-overlay" id="celebrationOverlay">
  <div class="celebration-content">
    <h2 id="celebrationTitle"></h2>
    <p id="celebrationSub"></p>
    <div class="celebration-verse" id="celebrationVerse"></div>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
// ============================================================
// STATE
// ============================================================
let displayState = null;
let tileElements = {};
const channel = new BroadcastChannel('scripture-sequence');

// ============================================================
// FULLSCREEN
// ============================================================
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'f' || e.key === 'F') {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
      toggleFullscreen();
    }
  }
});

// ============================================================
// FLIP QUEUE (staggered visible animations)
// ============================================================
let flipQueue = [];
let flipProcessing = false;

function queueFlip(tileId, callback) {
  flipQueue.push({ tileId, callback });
  if (!flipProcessing) processFlipQueue();
}

function processFlipQueue() {
  if (flipQueue.length === 0) { flipProcessing = false; return; }
  flipProcessing = true;
  const item = flipQueue.shift();
  item.callback();
  setTimeout(() => processFlipQueue(), 300);
}

function clearFlipQueue() {
  flipQueue = [];
  flipProcessing = false;
}

// ============================================================
// SOUND ENGINE
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getCtx() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

const SoundEngine = {
  correct() {
    try {
      const ctx = getCtx(); const t = ctx.currentTime;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 4000;
      filter.connect(ctx.destination);
      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq; osc.detune.value = (i - 1) * 3;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.1, t + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
        osc.connect(gain); gain.connect(filter);
        osc.start(t); osc.stop(t + 0.8);
      });
    } catch(e) {}
  },

  wrong() {
    try {
      const ctx = getCtx(); const t = ctx.currentTime;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 1500;
      filter.connect(ctx.destination);
      [[330, 220], [294, 196]].forEach(([f1, f2]) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f1, t);
        osc.frequency.linearRampToValueAtTime(f2, t + 0.3);
        gain.gain.setValueAtTime(0.08, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.connect(gain); gain.connect(filter);
        osc.start(t); osc.stop(t + 0.4);
      });
    } catch(e) {}
  },

  celebration() {
    try {
      const ctx = getCtx(); const t = ctx.currentTime;
      const chords = [
        { notes: [261.6, 329.6, 392.0], time: 0 },
        { notes: [392.0, 493.9, 587.3, 784.0], time: 0.5 }
      ];
      chords.forEach(chord => {
        chord.notes.forEach(freq => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle'; osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, t + chord.time);
          gain.gain.linearRampToValueAtTime(0.08, t + chord.time + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, t + chord.time + 1.2);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(t + chord.time); osc.stop(t + chord.time + 1.2);
        });
      });
    } catch(e) {}
  },

  tick() {
    try {
      const ctx = getCtx(); const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = 800;
      gain.gain.setValueAtTime(0.04, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.05);
    } catch(e) {}
  }
};

// ============================================================
// TIMER DISPLAY
// ============================================================
function updateTimer(remaining, duration) {
  const container = document.getElementById('timerBarContainer');
  const bar = document.getElementById('timerBar');
  container.classList.add('active');
  const pct = (remaining / duration) * 100;
  bar.style.width = pct + '%';
  bar.className = 'timer-bar' + (remaining <= 5 ? ' warning' : '');
  if (remaining <= 5 && remaining > 0) SoundEngine.tick();
}

function hideTimer() {
  const container = document.getElementById('timerBarContainer');
  container.classList.remove('active');
  document.getElementById('timerBar').style.width = '100%';
  document.getElementById('timerBar').className = 'timer-bar';
}

// ============================================================
// STOPWATCH DISPLAY
// ============================================================
function formatStopwatch(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  const tenths = Math.floor((seconds % 1) * 10);
  return `${mins}:${secs.toString().padStart(2, '0')}.${tenths}`;
}

function showStopwatch() {
  document.getElementById('stopwatchContainer').classList.add('active');
}

function hideStopwatch() {
  document.getElementById('stopwatchContainer').classList.remove('active');
  document.getElementById('stopwatchTime').textContent = '0:00.0';
}

function updateStopwatch(elapsed) {
  document.getElementById('stopwatchTime').textContent = formatStopwatch(elapsed);
}

// ============================================================
// CHANNEL LISTENER
// ============================================================
channel.onmessage = (e) => {
  const msg = e.data;

  switch (msg.type) {
    case 'new_round':
      hideCelebration();
      clearFlipQueue();
      displayState = msg.state;
      showGameScreen();
      buildTileGrid();
      updateFoundWords();
      updatePlayers();
      break;

    case 'correct_pick':
      displayState = msg.state;
      queueFlip(msg.tileIndex, () => {
        animateCorrectPick(msg.tileIndex);
        updateFoundWords();
        updatePlayers();
        SoundEngine.correct();
      });
      break;

    case 'wrong_pick':
      clearFlipQueue();
      animateWrongPick(msg.tileIndex, msg.revealedWord);
      showWrongFlash();
      SoundEngine.wrong();
      break;

    case 'reset_tiles':
      displayState = msg.state;
      animateResetTiles();
      if (displayState.mode !== 'solo') {
        showTurnFlash(displayState.players[displayState.currentPlayerIndex].name + "'s Turn");
      }
      break;

    case 'timer_expired':
      displayState = msg.state;
      showWrongFlash();
      SoundEngine.wrong();
      animateResetTiles();
      if (displayState.mode !== 'solo') {
        showTurnFlash("Time's Up! " + displayState.players[displayState.currentPlayerIndex].name + "'s Turn");
      }
      break;

    case 'race_wrong_reset':
      displayState = msg.state;
      // Only flip back the wrong tile, found tiles stay
      undoWrongOnDisplay(msg.tileId);
      updatePlayers();
      showTurnFlash(displayState.players[displayState.currentPlayerIndex].name + "'s Turn");
      break;

    case 'verse_complete':
      displayState = msg.state;
      queueFlip(msg.tileIndex, () => {
        animateCorrectPick(msg.tileIndex);
        SoundEngine.correct();
      });
      // Wait for queue to drain + a beat
      const waitForQueue = () => {
        if (flipProcessing) { setTimeout(waitForQueue, 100); return; }
        setTimeout(() => {
          updatePlayers();
          showCelebration(msg.playerIndex, msg.soloTime);
          SoundEngine.celebration();
        }, 400);
      };
      waitForQueue();
      break;

    case 'solo_time_up':
      displayState = msg.state;
      hideTimer();
      SoundEngine.wrong();
      showSoloTimeUp();
      break;

    case 'sync':
      displayState = msg.state;
      showGameScreen();
      buildTileGrid();
      updateFoundWords();
      updatePlayers();
      break;

    case 'reset':
      displayState = null;
      clearFlipQueue();
      showWaitingScreen();
      hideCelebration();
      hideTimer();
      hideStopwatch();
      break;

    case 'set_theme':
      applyTheme(msg.vars);
      break;

    case 'timer_tick':
      updateTimer(msg.remaining, msg.duration);
      break;

    case 'timer_stop':
      hideTimer();
      break;

    case 'stopwatch_start':
      showStopwatch();
      break;

    case 'stopwatch_tick':
      updateStopwatch(msg.elapsed);
      break;

    case 'stopwatch_stop':
      updateStopwatch(msg.elapsed);
      break;

    case 'undo_correct':
      clearFlipQueue();
      displayState = msg.state;
      undoCorrectOnDisplay(msg.tileId);
      updateFoundWords();
      updatePlayers();
      break;

    case 'undo_wrong':
      clearFlipQueue();
      displayState = msg.state;
      undoWrongOnDisplay(msg.tileId);
      updatePlayers();
      break;
  }
};

// ============================================================
// REQUEST SYNC ON LOAD
// ============================================================
setTimeout(() => { channel.postMessage({ type: 'request_sync' }); }, 300);

// ============================================================
// THEME
// ============================================================
function applyTheme(vars) {
  const root = document.documentElement;
  for (const [key, value] of Object.entries(vars)) {
    root.style.setProperty(key, value);
  }
}

// ============================================================
// SCREENS
// ============================================================
function showWaitingScreen() {
  document.getElementById('waitingScreen').style.display = 'flex';
  document.getElementById('gameScreen').classList.remove('active');
}

function showGameScreen() {
  document.getElementById('waitingScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.add('active');
  document.getElementById('verseRef').textContent = displayState.verseReference;
}

// ============================================================
// TILE GRID
// ============================================================
function buildTileGrid() {
  const grid = document.getElementById('tileGrid');
  const { gridRows, gridCols, tiles } = displayState;

  const availW = window.innerWidth - 80;
  const availH = window.innerHeight - 280;
  const maxTileW = Math.floor(availW / gridCols) - 16;
  const maxTileH = Math.floor(availH / gridRows) - 16;
  const tileW = Math.min(maxTileW, 200);
  const tileH = Math.min(maxTileH, 140, tileW * 0.75);

  grid.style.gridTemplateColumns = `repeat(${gridCols}, ${tileW}px)`;
  grid.style.gridTemplateRows = `repeat(${gridRows}, ${tileH}px)`;

  const slots = Array(gridRows * gridCols).fill(null);
  tiles.forEach(t => { slots[t.row * gridCols + t.col] = t; });

  tileElements = {};
  let tileNum = 0;

  grid.innerHTML = slots.map((tile) => {
    if (!tile) return '<div class="tile empty-slot"></div>';
    tileNum++;
    const flipped = tile.state === 'found' ? 'flipped found' : '';
    return `<div class="tile ${flipped}" id="tile-${tile.id}" data-id="${tile.id}">
      <div class="tile-inner">
        <div class="tile-face tile-back">
          <span class="tile-number">${tileNum}</span>
        </div>
        <div class="tile-face tile-front">
          <span class="tile-word">${esc(tile.word)}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  tiles.forEach(t => { tileElements[t.id] = document.getElementById('tile-' + t.id); });
}

// ============================================================
// ANIMATIONS
// ============================================================
function animateCorrectPick(tileId) {
  const el = tileElements[tileId];
  if (!el) return;
  el.classList.add('flipped', 'found', 'correct-pulse', 'correct-glow');
  setTimeout(() => { el.classList.remove('correct-pulse', 'correct-glow'); }, 800);
  const tile = displayState.tiles.find(t => t.id === tileId);
  if (tile) tile.state = 'found';
  updateFoundWords();
}

function animateWrongPick(tileId, word) {
  const el = tileElements[tileId];
  if (!el) return;
  const wordEl = el.querySelector('.tile-word');
  if (wordEl) wordEl.textContent = word;
  el.classList.add('flipped', 'wrong');
}

function animateResetTiles() {
  const visibleTiles = Object.values(tileElements).filter(el => el.classList.contains('flipped'));
  visibleTiles.forEach((el, i) => {
    setTimeout(() => {
      el.classList.add('flip-back');
      el.classList.remove('flipped', 'found', 'wrong');
      setTimeout(() => el.classList.remove('flip-back'), 600);
    }, i * 80);
  });
  setTimeout(() => { updateFoundWords(); updatePlayers(); }, visibleTiles.length * 80 + 100);
}

function undoCorrectOnDisplay(tileId) {
  const el = tileElements[tileId];
  if (!el) return;
  el.classList.add('flip-back');
  el.classList.remove('flipped', 'found', 'correct-pulse', 'correct-glow');
  setTimeout(() => el.classList.remove('flip-back'), 600);
}

function undoWrongOnDisplay(tileId) {
  const el = tileElements[tileId];
  if (!el) return;
  el.classList.add('flip-back');
  el.classList.remove('flipped', 'wrong');
  setTimeout(() => el.classList.remove('flip-back'), 600);
  // Hide turn flash if visible
  document.getElementById('turnFlash').classList.remove('active');
}

function showTurnFlash(text) {
  const flash = document.getElementById('turnFlash');
  document.getElementById('turnFlashText').textContent = text;
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 1500);
}

function showWrongFlash() {
  const el = document.createElement('div');
  el.className = 'wrong-flash';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 500);
}

// ============================================================
// CELEBRATION
// ============================================================
function showCelebration(playerIndex, soloTime) {
  const player = displayState.players[playerIndex];
  const isSolo = displayState.mode === 'solo';
  const isRace = displayState.mode === 'race';

  if (isSolo && soloTime != null) {
    document.getElementById('celebrationTitle').textContent = 'Verse Complete!';
    document.getElementById('celebrationSub').textContent =
      player.name + ' finished in ' + formatStopwatch(soloTime) + '!';
    hideStopwatch();
  } else if (isRace) {
    const p1 = displayState.players[0], p2 = displayState.players[1];
    const winner = p1.score > p2.score ? p1.name : p2.score > p1.score ? p2.name : null;
    document.getElementById('celebrationTitle').textContent = 'Verse Complete!';
    document.getElementById('celebrationSub').textContent = winner
      ? winner + ' wins ' + p1.score + ' - ' + p2.score + '!'
      : "It's a tie! " + p1.score + ' - ' + p2.score;
  } else {
    // Classic mode: winner is whoever has the most points
    const p1 = displayState.players[0], p2 = displayState.players[1];
    const winner = p1.score > p2.score ? p1.name : p2.score > p1.score ? p2.name : null;
    document.getElementById('celebrationTitle').textContent = 'Verse Complete!';
    document.getElementById('celebrationSub').textContent = winner
      ? winner + ' wins! ' + p1.score + ' - ' + p2.score
      : "It's a tie! " + p1.score + ' - ' + p2.score;
  }

  const verseText = displayState.verseText || displayState.foundWords.join(' ');
  document.getElementById('celebrationVerse').textContent =
    displayState.verseReference + ' \u2014 ' + verseText;
  document.getElementById('celebrationOverlay').classList.add('active');
  launchConfetti();
}

function showSoloTimeUp() {
  document.getElementById('celebrationTitle').textContent = "Time's Up!";
  const progress = displayState.foundWords.length + ' of ' + displayState.totalWords + ' words found';
  document.getElementById('celebrationSub').textContent = progress;
  document.getElementById('celebrationVerse').textContent =
    displayState.verseReference + ' \u2014 ' + (displayState.verseText || '');
  document.getElementById('celebrationOverlay').classList.add('active');
  showWrongFlash();
}

function hideCelebration() {
  document.getElementById('celebrationOverlay').classList.remove('active');
  document.getElementById('confettiContainer').innerHTML = '';
}

function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#d4a843', '#f0d078', '#4caf50', '#e74c3c', '#2d6aa5', '#9b59b6', '#f39c12', '#1abc9c'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 8 + 6) + 'px';
    piece.style.height = (Math.random() * 14 + 10) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
    piece.style.animationDelay = (Math.random() * 1.5) + 's';
    piece.style.opacity = Math.random() * 0.5 + 0.5;
    container.appendChild(piece);
  }
}

// ============================================================
// UI UPDATES
// ============================================================
function updateFoundWords() {
  if (!displayState) return;
  const container = document.getElementById('foundWords');
  const { foundWords, totalWords } = displayState;
  let html = '';
  for (let i = 0; i < totalWords; i++) {
    if (i < foundWords.length) {
      html += `<span class="fw-word found">${esc(foundWords[i])}</span>`;
    } else {
      html += `<span class="fw-word blank"></span>`;
    }
  }
  container.innerHTML = html;
}

function updatePlayers() {
  if (!displayState) return;
  const bar = document.getElementById('playerBar');
  const isSolo = displayState.mode === 'solo';
  const playersToShow = isSolo ? [displayState.players[0]] : displayState.players;
  bar.innerHTML = playersToShow.map((p, i) => {
    const active = (isSolo || i === displayState.currentPlayerIndex) ? 'active' : '';
    return `<div class="player-panel ${active}">
      <div class="player-indicator"></div>
      <div class="player-name">${esc(p.name)}</div>
      <div class="player-score">${p.score}</div>
    </div>`;
  }).join('');
}

// ============================================================
// UTILITY
// ============================================================
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

window.addEventListener('resize', () => {
  if (displayState && displayState.tiles.length > 0) {
    buildTileGrid();
    displayState.tiles.forEach(t => {
      const el = tileElements[t.id];
      if (el && t.state === 'found') el.classList.add('flipped', 'found');
    });
  }
});
</script>
