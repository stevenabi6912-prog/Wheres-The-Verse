<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where's the Verse - Operator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e; color: #e0e0e0;
    padding: 12px; font-size: 14px;
  }
  h1 { font-size: 20px; color: #d4a843; margin-bottom: 10px; }
  h2 { font-size: 15px; color: #8899aa; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

  .top-bar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    background: #16213e; padding: 10px 14px; border-radius: 8px;
  }
  .top-bar h1 { margin: 0; white-space: nowrap; }
  .top-bar .spacer { flex: 1; }

  .btn {
    padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-gold { background: #d4a843; color: #1a1a2e; }
  .btn-gold:hover { background: #e0b854; }
  .btn-blue { background: #2d6aa5; color: white; }
  .btn-blue:hover { background: #3578b9; }
  .btn-red { background: #a53333; color: white; }
  .btn-red:hover { background: #c43c3c; }
  .btn-green { background: #2d8a4e; color: white; }
  .btn-green:hover { background: #38a55e; }
  .btn-orange { background: #c97a20; color: white; }
  .btn-orange:hover { background: #d98a30; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  input, textarea, select {
    background: #0f3460; border: 1px solid #2d6aa5; color: #e0e0e0;
    padding: 7px 10px; border-radius: 5px; font-size: 13px; width: 100%;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #d4a843; }
  textarea { resize: vertical; min-height: 50px; }
  select { cursor: pointer; }
  label { font-size: 12px; color: #8899aa; margin-bottom: 3px; display: block; }

  .layout { display: grid; grid-template-columns: 320px 1fr; gap: 12px; }
  .panel {
    background: #16213e; border-radius: 8px; padding: 14px;
    border: 1px solid #1e3a5f;
  }
  .section { margin-bottom: 14px; }
  .section:last-child { margin-bottom: 0; }

  .form-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px; }
  .form-row .field { flex: 1; }

  .verse-list { max-height: 200px; overflow-y: auto; }
  .verse-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    background: #0f3460; border-radius: 5px; margin-bottom: 4px;
    font-size: 12px;
  }
  .verse-item .ref { font-weight: 700; color: #d4a843; min-width: 90px; }
  .verse-item .text { flex: 1; opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .verse-item .count { color: #8899aa; font-size: 11px; white-space: nowrap; }
  .verse-item .actions { display: flex; gap: 4px; }

  .game-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .game-controls .field { flex: 1; min-width: 120px; }

  .status-bar {
    background: #0f3460; border-radius: 6px; padding: 10px 14px;
    margin-bottom: 12px; display: flex; gap: 20px; align-items: center;
    flex-wrap: wrap;
  }
  .status-item { font-size: 13px; }
  .status-item strong { color: #d4a843; }
  .status-item.active-player { color: #4caf50; font-weight: 700; }
  .status-item.looking-for { color: #e0b854; }

  .tile-grid-operator {
    display: grid; gap: 8px; justify-content: center;
    padding: 10px;
  }
  .op-tile {
    width: 100%; aspect-ratio: 1.4; border-radius: 8px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; transition: all 0.2s;
    border: 2px solid #2d6aa5; position: relative;
  }
  .op-tile.hidden-tile {
    background: linear-gradient(135deg, #1e3a5f, #16213e);
    color: #5588aa;
  }
  .op-tile.hidden-tile:hover {
    border-color: #d4a843; background: linear-gradient(135deg, #2a4a6f, #1e3060);
  }
  .op-tile.found-tile {
    background: linear-gradient(135deg, #1a5a2a, #0f3d1a);
    border-color: #4caf50; color: #8fdf8f;
  }
  .op-tile.wrong-tile {
    background: linear-gradient(135deg, #6a1a1a, #4a0f0f);
    border-color: #e74c3c; color: #ff8888;
  }
  .op-tile.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
  .op-tile .tile-num {
    position: absolute; top: 3px; left: 6px; font-size: 10px; color: #5588aa;
  }
  .op-tile .tile-word { font-size: 13px; text-align: center; padding: 0 4px; }
  .op-tile .tile-answer {
    font-size: 10px; color: #888; margin-top: 2px;
    opacity: 0; transition: opacity 0.2s;
  }
  .show-answers .op-tile .tile-answer { opacity: 1; }

  .found-words-bar {
    background: #0f3460; border-radius: 6px; padding: 10px 14px;
    margin-top: 10px; font-size: 14px; line-height: 1.8;
    min-height: 42px;
  }
  .found-words-bar .found-word {
    display: inline-block; padding: 2px 6px; background: #2d8a4e;
    border-radius: 4px; margin: 2px; color: white; font-weight: 600;
  }
  .found-words-bar .blank-word {
    display: inline-block; padding: 2px 6px; background: #1e3a5f;
    border-radius: 4px; margin: 2px; color: #5588aa;
  }

  .controls-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
  .toggle input { width: auto; }

  .import-section { margin-top: 10px; }
  .import-section textarea { font-size: 11px; min-height: 60px; }

  .empty-msg { color: #556; font-style: italic; font-size: 12px; padding: 10px; text-align: center; }

  /* Toast notifications */
  .toast-container {
    position: fixed; top: 12px; right: 12px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    padding: 10px 16px; border-radius: 8px; font-size: 13px;
    font-weight: 600; color: white; min-width: 200px;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .toast.success { background: #2d8a4e; }
  .toast.error { background: #a53333; }
  .toast.info { background: #2d6aa5; }
  @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

  /* Keyboard hint */
  .key-hint {
    position: absolute; bottom: 3px; right: 6px;
    font-size: 9px; color: #445; font-weight: 400;
  }
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="top-bar">
  <h1>Where's the Verse</h1>
  <span style="color:#556;font-size:12px;">Operator Panel</span>
  <div class="spacer"></div>
  <label class="toggle" style="color:#888;">
    <input type="checkbox" id="soundToggle" checked onchange="toggleSound()">
    Sound
  </label>
  <button class="btn btn-gold" onclick="openDisplayWindow()">Open Display Window</button>
</div>

<div class="layout">
  <!-- LEFT: Verse Management -->
  <div class="panel">
    <div class="section">
      <h2>Add Verse</h2>
      <div style="margin-bottom:6px;">
        <label>Reference (e.g. John 3:16)</label>
        <input type="text" id="verseRef" placeholder="John 3:16">
      </div>
      <div style="margin-bottom:6px;">
        <label>Verse Text (10-15 words recommended)</label>
        <textarea id="verseText" placeholder="For God so loved the world that he gave his only begotten Son"></textarea>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="btn btn-blue" onclick="addVerse()">Add Verse</button>
        <span id="wordCount" style="font-size:11px;color:#888;"></span>
      </div>
    </div>

    <div class="section">
      <h2>Saved Verses</h2>
      <div id="verseList" class="verse-list"></div>
    </div>

    <div class="section import-section">
      <h2>Bulk Import</h2>
      <label>One per line: Reference | Verse text</label>
      <textarea id="bulkImport" placeholder="John 3:16 | For God so loved the world...&#10;Romans 8:28 | And we know that all things..."></textarea>
      <button class="btn btn-blue btn-sm" onclick="bulkImportVerses()" style="margin-top:4px;">Import</button>
    </div>
  </div>

  <!-- RIGHT: Game Area -->
  <div>
    <!-- Game Setup -->
    <div class="panel" style="margin-bottom:12px;">
      <div class="game-controls">
        <div class="field">
          <label>Select Verse</label>
          <select id="verseSelect"><option value="">-- Choose a verse --</option></select>
        </div>
        <div class="field">
          <label>Player 1</label>
          <input type="text" id="player1Name" value="Player 1">
        </div>
        <div class="field">
          <label>Player 2</label>
          <input type="text" id="player2Name" value="Player 2">
        </div>
        <button class="btn btn-green" id="startBtn" onclick="startRound()">Start Round</button>
        <button class="btn btn-orange btn-sm" id="passBtn" onclick="passTurn()" style="display:none;">Pass Turn</button>
        <button class="btn btn-red btn-sm" onclick="resetGame()">Reset</button>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <div class="status-item" id="statusTurn">Waiting to start...</div>
      <div class="status-item" id="statusLooking"></div>
      <div class="status-item" id="statusScore"></div>
      <div class="status-item" id="statusProgress"></div>
    </div>

    <!-- Tile Grid -->
    <div class="panel" id="gamePanel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h2 id="verseRefDisplay" style="margin:0;"></h2>
        <div class="controls-row" style="margin:0;">
          <label class="toggle">
            <input type="checkbox" id="showAnswers" onchange="toggleAnswers()">
            Show Answer Key
          </label>
        </div>
      </div>
      <div class="tile-grid-operator" id="tileGrid">
        <div class="empty-msg">Select a verse and click Start Round to begin</div>
      </div>
      <div class="found-words-bar" id="foundWordsBar"></div>
      <div style="margin-top:6px;font-size:11px;color:#445;text-align:center;" id="keyHintBar"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// TOAST NOTIFICATIONS (replaces alert())
// ============================================================
function toast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ============================================================
// SOUND EFFECTS
// ============================================================
let soundEnabled = true;
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function toggleSound() {
  soundEnabled = document.getElementById('soundToggle').checked;
}

function playSound(type) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'correct') {
      osc.frequency.setValueAtTime(523, ctx.currentTime); // C5
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1); // E5
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } else if (type === 'celebration') {
      // Ascending arpeggio
      [523, 659, 784, 1047].forEach((freq, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.12);
        g.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.4);
        o.start(ctx.currentTime + i * 0.12);
        o.stop(ctx.currentTime + i * 0.12 + 0.4);
      });
    }
  } catch (e) { /* audio not available */ }
}

// ============================================================
// GAME STATE
// ============================================================
let verses = JSON.parse(localStorage.getItem('wtv_verses') || '[]');
let gameState = {
  phase: 'idle', // idle, playing, celebration
  verse: null,
  words: [],
  tiles: [],
  gridRows: 0,
  gridCols: 0,
  currentWordIndex: 0,
  foundWords: [],
  players: [{ name: 'Player 1', score: 0 }, { name: 'Player 2', score: 0 }],
  currentPlayerIndex: 0,
  locked: false
};

const channel = new BroadcastChannel('wheres-the-verse');

// Listen for display requesting sync
channel.onmessage = (e) => {
  if (e.data.type === 'request_sync') {
    if (gameState.phase !== 'idle') {
      channel.postMessage({ type: 'new_round', state: getDisplayState() });
    }
  }
};

// ============================================================
// VERSE MANAGEMENT
// ============================================================
function saveVerses() {
  localStorage.setItem('wtv_verses', JSON.stringify(verses));
  renderVerseList();
  renderVerseSelect();
}

function addVerse() {
  const ref = document.getElementById('verseRef').value.trim();
  const text = document.getElementById('verseText').value.trim();
  if (!ref || !text) return toast('Please enter both reference and verse text.', 'error');
  const words = text.split(/\s+/).filter(w => w);
  if (words.length < 3) return toast('Verse must have at least 3 words.', 'error');
  if (words.length > 25) return toast('Verse should have 25 words or fewer for best gameplay.', 'error');
  verses.push({ id: Date.now(), reference: ref, text: text });
  saveVerses();
  document.getElementById('verseRef').value = '';
  document.getElementById('verseText').value = '';
  document.getElementById('wordCount').textContent = '';
  toast(`Added "${ref}" (${words.length} words)`, 'success');
}

function deleteVerse(id) {
  const verse = verses.find(v => v.id === id);
  if (!verse) return;
  verses = verses.filter(v => v.id !== id);
  saveVerses();
  toast(`Deleted "${verse.reference}"`, 'info');
}

function bulkImportVerses() {
  const raw = document.getElementById('bulkImport').value.trim();
  if (!raw) return;
  const lines = raw.split('\n').filter(l => l.trim());
  let added = 0;
  for (const line of lines) {
    const parts = line.split('|');
    if (parts.length >= 2) {
      const ref = parts[0].trim();
      const text = parts.slice(1).join('|').trim();
      const words = text.split(/\s+/).filter(w => w);
      if (ref && words.length >= 3) {
        verses.push({ id: Date.now() + added, reference: ref, text: text });
        added++;
      }
    }
  }
  if (added > 0) {
    saveVerses();
    document.getElementById('bulkImport').value = '';
    toast(`Imported ${added} verse(s)`, 'success');
  } else {
    toast('No valid verses found. Use format: Reference | Verse text', 'error');
  }
}

function renderVerseList() {
  const el = document.getElementById('verseList');
  if (verses.length === 0) {
    el.innerHTML = '<div class="empty-msg">No verses added yet</div>';
    return;
  }
  el.innerHTML = verses.map(v => {
    const wc = v.text.split(/\s+/).filter(w => w).length;
    return `<div class="verse-item">
      <span class="ref">${esc(v.reference)}</span>
      <span class="text">${esc(v.text)}</span>
      <span class="count">${wc}w</span>
      <div class="actions">
        <button class="btn btn-red btn-sm" onclick="deleteVerse(${v.id})">Del</button>
      </div>
    </div>`;
  }).join('');
}

function renderVerseSelect() {
  const sel = document.getElementById('verseSelect');
  const val = sel.value;
  sel.innerHTML = '<option value="">-- Choose a verse --</option>' +
    verses.map(v => `<option value="${v.id}">${esc(v.reference)} (${v.text.split(/\s+/).length}w)</option>`).join('');
  sel.value = val;
}

// ============================================================
// GRID HELPERS
// ============================================================
function getGridDimensions(count) {
  if (count <= 6) return { rows: 2, cols: Math.ceil(count / 2) };
  if (count <= 12) return { rows: 3, cols: Math.ceil(count / 3) };
  if (count <= 20) return { rows: 4, cols: Math.ceil(count / 4) };
  return { rows: 5, cols: Math.ceil(count / 5) };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// GAME LOGIC
// ============================================================
function startRound() {
  const verseId = parseInt(document.getElementById('verseSelect').value);
  const verse = verses.find(v => v.id === verseId);
  if (!verse) return toast('Please select a verse first.', 'error');

  const words = verse.text.split(/\s+/).filter(w => w);
  const { rows, cols } = getGridDimensions(words.length);

  const positions = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      positions.push({ row: r, col: c });

  const shuffledPositions = shuffle(positions).slice(0, words.length);
  const tiles = words.map((word, i) => ({
    id: i,
    word: word,
    wordIndex: i,
    row: shuffledPositions[i].row,
    col: shuffledPositions[i].col,
    state: 'hidden'
  }));

  gameState.phase = 'playing';
  gameState.verse = verse;
  gameState.words = words;
  gameState.tiles = tiles;
  gameState.gridRows = rows;
  gameState.gridCols = cols;
  gameState.currentWordIndex = 0;
  gameState.foundWords = [];
  gameState.currentPlayerIndex = 0;
  gameState.locked = false;
  gameState.players[0].name = document.getElementById('player1Name').value || 'Player 1';
  gameState.players[1].name = document.getElementById('player2Name').value || 'Player 2';

  document.getElementById('passBtn').style.display = '';
  renderGame();
  channel.postMessage({ type: 'new_round', state: getDisplayState() });
}

function resetGame() {
  gameState.phase = 'idle';
  gameState.tiles = [];
  gameState.foundWords = [];
  gameState.currentWordIndex = 0;
  gameState.players[0].score = 0;
  gameState.players[1].score = 0;
  gameState.locked = false;
  document.getElementById('passBtn').style.display = 'none';
  renderGame();
  channel.postMessage({ type: 'reset' });
}

function passTurn() {
  if (gameState.phase !== 'playing' || gameState.locked) return;

  // Reset verse progress and switch player
  gameState.tiles.forEach(t => {
    if (t.state === 'found') t.state = 'hidden';
  });
  gameState.foundWords = [];
  gameState.currentWordIndex = 0;
  gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % 2;
  renderGame();

  channel.postMessage({ type: 'reset_tiles', state: getDisplayState() });
  toast(`Passed to ${gameState.players[gameState.currentPlayerIndex].name}`, 'info');
}

function onTileClick(tileId) {
  if (gameState.phase !== 'playing' || gameState.locked) return;

  const tile = gameState.tiles.find(t => t.id === tileId);
  if (!tile || tile.state === 'found') return;

  const neededWord = gameState.words[gameState.currentWordIndex];

  if (tile.word === neededWord) {
    // CORRECT
    tile.state = 'found';
    gameState.foundWords.push(tile.word);
    gameState.currentWordIndex++;
    playSound('correct');

    if (gameState.currentWordIndex >= gameState.words.length) {
      // VERSE COMPLETE
      gameState.players[gameState.currentPlayerIndex].score++;
      gameState.phase = 'celebration';
      playSound('celebration');
      renderGame();
      channel.postMessage({
        type: 'verse_complete',
        tileIndex: tile.id,
        playerIndex: gameState.currentPlayerIndex,
        state: getDisplayState()
      });
      return;
    }

    renderGame();
    channel.postMessage({
      type: 'correct_pick',
      tileIndex: tile.id,
      state: getDisplayState()
    });
  } else {
    // WRONG
    gameState.locked = true;
    tile.state = 'revealed';
    playSound('wrong');
    renderGame();

    channel.postMessage({
      type: 'wrong_pick',
      tileIndex: tile.id,
      revealedWord: tile.word
    });

    setTimeout(() => {
      gameState.tiles.forEach(t => {
        if (t.state === 'found' || t.state === 'revealed') t.state = 'hidden';
      });
      gameState.foundWords = [];
      gameState.currentWordIndex = 0;
      gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % 2;
      gameState.locked = false;
      renderGame();

      channel.postMessage({
        type: 'reset_tiles',
        state: getDisplayState()
      });
    }, 2000);
  }
}

function nextRound() {
  gameState.phase = 'idle';
  document.getElementById('passBtn').style.display = 'none';
  renderGame();
  // Tell display to go back to waiting
  channel.postMessage({ type: 'reset' });
}

// ============================================================
// DISPLAY STATE
// ============================================================
function getDisplayState() {
  return {
    phase: gameState.phase,
    verseReference: gameState.verse ? gameState.verse.reference : '',
    verseText: gameState.verse ? gameState.verse.text : '',
    tiles: gameState.tiles.map(t => ({
      id: t.id, word: t.word, row: t.row, col: t.col, state: t.state
    })),
    gridRows: gameState.gridRows,
    gridCols: gameState.gridCols,
    foundWords: [...gameState.foundWords],
    totalWords: gameState.words.length,
    currentWordIndex: gameState.currentWordIndex,
    players: gameState.players.map(p => ({ name: p.name, score: p.score })),
    currentPlayerIndex: gameState.currentPlayerIndex
  };
}

// ============================================================
// RENDER
// ============================================================
function renderGame() {
  const grid = document.getElementById('tileGrid');
  const refDisplay = document.getElementById('verseRefDisplay');
  const foundBar = document.getElementById('foundWordsBar');
  const keyHint = document.getElementById('keyHintBar');

  if (gameState.phase === 'idle' || gameState.tiles.length === 0) {
    grid.innerHTML = '<div class="empty-msg">Select a verse and click Start Round to begin</div>';
    document.getElementById('statusTurn').textContent = 'Waiting to start...';
    document.getElementById('statusLooking').textContent = '';
    document.getElementById('statusScore').textContent = '';
    document.getElementById('statusProgress').textContent = '';
    refDisplay.textContent = '';
    foundBar.innerHTML = '';
    keyHint.textContent = '';
    return;
  }

  refDisplay.textContent = gameState.verse.reference;

  // Status
  const cp = gameState.players[gameState.currentPlayerIndex];
  document.getElementById('statusTurn').innerHTML =
    gameState.phase === 'celebration'
      ? `<strong style="color:#4caf50">${esc(cp.name)} completed the verse!</strong>`
      : `<span class="active-player">${esc(cp.name)}'s Turn</span>`;
  document.getElementById('statusLooking').innerHTML =
    gameState.phase === 'playing'
      ? `<span class="looking-for">Looking for word ${gameState.currentWordIndex + 1}: "<strong>${esc(gameState.words[gameState.currentWordIndex])}</strong>"</span>`
      : '';
  document.getElementById('statusScore').innerHTML =
    `<strong>${esc(gameState.players[0].name)}</strong>: ${gameState.players[0].score} &nbsp;|&nbsp; <strong>${esc(gameState.players[1].name)}</strong>: ${gameState.players[1].score}`;
  document.getElementById('statusProgress').textContent =
    `${gameState.foundWords.length} / ${gameState.words.length} words`;

  // Tile grid
  grid.style.gridTemplateColumns = `repeat(${gameState.gridCols}, 1fr)`;
  grid.style.maxWidth = `${gameState.gridCols * 130}px`;

  const slots = Array(gameState.gridRows * gameState.gridCols).fill(null);
  gameState.tiles.forEach(t => {
    slots[t.row * gameState.gridCols + t.col] = t;
  });

  // Build keyboard shortcut map (1-9, 0 for 10, then a-z)
  let keyIndex = 0;
  const keyLabels = '1234567890abcdefghijklmnop'.split('');

  grid.innerHTML = slots.map((tile, i) => {
    if (!tile) return '<div></div>';
    const stateClass = tile.state === 'found' ? 'found-tile' :
                       tile.state === 'revealed' ? 'wrong-tile' : 'hidden-tile';
    const disabled = gameState.phase !== 'playing' || tile.state === 'found' ? 'disabled' : '';
    const wordDisplay = tile.state !== 'hidden' ? esc(tile.word) : '';
    const key = keyLabels[keyIndex] || '';
    tile._keyLabel = key;
    keyIndex++;
    return `<div class="op-tile ${stateClass} ${disabled}" onclick="onTileClick(${tile.id})" data-key="${key}">
      <span class="tile-num">${tile.id + 1}</span>
      <span class="tile-word">${wordDisplay || '?'}</span>
      <span class="tile-answer">${esc(tile.word)}</span>
      <span class="key-hint">${key}</span>
    </div>`;
  }).join('');

  if (gameState.phase === 'celebration') {
    grid.innerHTML += `<div style="grid-column:1/-1;text-align:center;padding:12px;">
      <button class="btn btn-gold" onclick="nextRound()">Next Round</button>
    </div>`;
  }

  // Found words bar
  foundBar.innerHTML = gameState.words.map((w, i) => {
    if (i < gameState.foundWords.length) {
      return `<span class="found-word">${esc(w)}</span>`;
    }
    return `<span class="blank-word">____</span>`;
  }).join(' ');

  // Keyboard hint
  keyHint.textContent = gameState.phase === 'playing' ? 'Press a key (1-9, 0, a-z) to flip that tile' : '';
}

function toggleAnswers() {
  const checked = document.getElementById('showAnswers').checked;
  document.getElementById('gamePanel').classList.toggle('show-answers', checked);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (gameState.phase !== 'playing' || gameState.locked) return;
  // Don't capture when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  const key = e.key.toLowerCase();
  const tileEl = document.querySelector(`.op-tile[data-key="${key}"]`);
  if (tileEl && !tileEl.classList.contains('disabled')) {
    // Find the tile id from the onclick
    const tileId = parseInt(tileEl.getAttribute('onclick').match(/\d+/)[0]);
    onTileClick(tileId);
  }
});

// ============================================================
// DISPLAY WINDOW
// ============================================================
let displayWindow = null;
function openDisplayWindow() {
  if (displayWindow && !displayWindow.closed) {
    displayWindow.focus();
    return;
  }
  displayWindow = window.open('display.html', 'WTVDisplay',
    'width=1280,height=720,menubar=no,toolbar=no');
  // The display will request sync when it loads - no fragile timeout needed
}

// ============================================================
// UTILITY
// ============================================================
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Word count preview
document.getElementById('verseText').addEventListener('input', (e) => {
  const wc = e.target.value.trim().split(/\s+/).filter(w => w).length;
  document.getElementById('wordCount').textContent = wc > 0 ? `${wc} words` : '';
});

// ============================================================
// INIT
// ============================================================
renderVerseList();
renderVerseSelect();
renderGame();
</script>
</body>
</html>
